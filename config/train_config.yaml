dataset:
  dataset_path: /ceph/home/student.aau.dk/rk33gs/my_datasets/miniprojekt_dataset
  test_size: 0.1
  random_state: 42

classes:
  angry: 0
  disgust: 1
  fear: 2
  happy: 3
  neutral: 4
  sad: 5
  surprise: 6

model: 
  name: resnet50
  pretrained: True
  num_classes: 7
  layers: ["layer1", "layer2", "layer3", "layer4", "fc"]
  freeze_layers: ["layer1", "layer2", "layer3"]
  dropout_fc1: 0.4
  dropout_fc2: 0.3
  hidden_units: 256


optimizer:
  name: AdamW
  lr: 0.0001
  weight_decay: 0.0001


scheduler:
  name: OneCycleLR
  max_lr: 0.0001
  epochs: 15
  pct_start: 0.1
  anneal_strategy: cos


train:
  artifacts_path: /ceph/home/student.aau.dk/rk33gs/MLOps/artifacts/
  batch_size: 32
  epochs: 15
  shuffle: True 
  num_workers: 4
  pin_memory: True

  RandomResizedCrop: 
    size: 224
    scale: [0.8, 1.0]
  
  RandomHorizontalFlip:
    p: 0.5
  
  RandomRotation: 
    degrees: 15
  
  ColorJitter:
    brightness: 0.15
    contrast: 0.15
  
  Normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]


evaluate:
  batch_size: 32
  num_workers: 2
  shuffle: False
  pin_memory: True
  
  Resize:
    size: 256
  
  CenterCrop:
    size: 224
  
  Normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]