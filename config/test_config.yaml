dataset:
  dataset_path: /ceph/home/student.aau.dk/rk33gs/my_datasets/miniprojekt_dataset
  test_size: 0.1
  random_state: 42

classes:
  angry: 0
  disgust: 1
  fear: 2
  happy: 3
  neutral: 4
  sad: 5
  surprise: 6

transforms:
  Resize:
    size: 256
  
  CenterCrop:
    size: 224
  
  Normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

batch_size: 32
shuffle: False
num_workers: 2
pin_memory: True
accuracy_threshold: 0.70